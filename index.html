<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Nível 6 - Nicolas Gael!</title>
<style>
  /* Importando a fonte estilo Minecraft */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    margin: 0;
    padding: 0;
    background-color: #3b3b3b; 
    background-image: repeating-linear-gradient(45deg, #2b2b2b 25%, transparent 25%, transparent 75%, #2b2b2b 75%, #2b2b2b), repeating-linear-gradient(45deg, #2b2b2b 25%, #3b3b3b 25%, #3b3b3b 75%, #2b2b2b 75%, #2b2b2b);
    background-position: 0 0, 20px 20px;
    background-size: 40px 40px;
    font-family: 'Press Start 2P', cursive;
    /* Removemos o flexbox daqui para evitar que ele corte o topo/fundo da tela */
    min-height: 100vh;
    overflow-x: hidden; /* Esconde a barra horizontal das partículas */
    overflow-y: auto;   /* LIBERA A ROLAGEM VERTICAL NO CELULAR! */
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }
  /* --- TELA INICIAL (Logo e Creeper centralizados) --- */
  #initial-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: opacity 0.5s ease-out;
    width: 100%;
    height: 100vh; /* Preenche a altura total para centralizar */
    z-index: 10;
    position: relative;
  }

  .minecraft-logo {
    width: 80%;
    max-width: 400px;
    height: auto;
    margin-bottom: 50px;
    object-fit: contain;
  }

  #creeper-container {
    cursor: pointer;
    perspective: 1000px;
    animation: creeperWobble 4s ease-in-out infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .creeper-svg {
    width: 150px;
    height: 150px;
    max-width: 100%;
    object-fit: contain;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 15px;
  }

  @keyframes creeperWobble {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(2deg) scale(1.02); }
    50% { transform: rotate(-2deg) scale(0.98); }
    75% { transform: rotate(1deg) scale(1.01); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .inflate {
    animation: creeperInflate 1.5s ease-out forwards;
  }

  @keyframes creeperInflate {
    0% { transform: scale(1); filter: brightness(100%); }
    20% { transform: scale(1.1); filter: brightness(110%); }
    40% { transform: scale(1.2); filter: brightness(120%); }
    60% { transform: scale(1.4); filter: brightness(150%); }
    80% { transform: scale(1.7); filter: brightness(200%); }
    100% { transform: scale(2.0); filter: brightness(300%); opacity: 0; }
  }

  .creeper-text {
    font-size: 14px;
    margin: 0;
    line-height: 1.5;
  }

  /* --- TELA DO CONVITE (Aparece após a explosão) --- */
  #invite-container {
    display: none; 
    flex-direction: column;
    align-items: center;
    justify-content: center; /* Centraliza verticalmente se a tela for muito grande */
    min-height: 100vh; /* Garante que preencha pelo menos a tela inteira */
    padding: 30px 0; /* Adiciona um "respiro" em cima e embaixo para o conteúdo não colar nas bordas */
    opacity: 0;
    transform: scale(0.1); 
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    width: 100%;
  }

  #invite-container.show {
    display: flex;
    opacity: 1;
    transform: scale(1);
  }

  .floating {
    animation: float 4s ease-in-out infinite;
    display: flex;
    justify-content: center;
    width: 100%;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }

  .invite-image {
    max-width: 90%;
    max-height: 70vh;
    border: 6px solid #555;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(50, 205, 50, 0.6); 
  }

  /* --- GRUPO DE BOTÕES (Central e Lado a Lado) --- */
  .button-group {
    display: flex;
    flex-direction: row; /* Lado a lado no computador */
    justify-content: center;
    align-items: stretch; /* Mesma altura para os botões */
    gap: 20px; /* Espaço entre os botões */
    width: 90%;
    max-width: 800px;
    margin-top: 40px;
    margin-bottom: 40px;
  }

  /* Estilo base para os botões do Minecraft */
  .mc-button {
    flex: 1; /* Divide o espaço igualmente */
    color: white;
    border: 4px solid #2E7D32;
    padding: 15px 20px;
    font-family: 'Press Start 2P', cursive;
    font-size: 11px; /* Tamanho ligeiramente menor para caber melhor */
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    line-height: 1.8;
    box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2), 4px 4px 0px rgba(0,0,0,0.5);
    transition: all 0.1s;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center; /* Centraliza conteúdo internaamente */
  }

  .mc-button:hover {
    transform: translateY(4px);
    box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), 0px 0px 0px rgba(0,0,0,0.5);
  }

  /* Botão 1: WhatsApp (Verde) */
  .rsvp-button {
    background-color: #4CAF50;
    border-color: #2E7D32;
  }
  .rsvp-button:hover {
    background-color: #45a049;
  }

  /* Botão 2: Localização (Vermelho Bússola) */
  .location-button {
    background-color: #B22222; /* Vermelho Redstone/TNT */
    border-color: #550000;
  }
  .location-button:hover {
    background-color: #a01f1f;
  }

  /* Conteúdo do botão de localização */
  .compass-gif {
    width: 50px; /* Tamanho controlado do GIF */
    height: 50px;
    margin-bottom: 10px;
    object-fit: contain;
  }

  .location-text {
    font-size: 11px;
    line-height: 1.5;
  }

  /* --- AJUSTE PARA DISPOSITIVOS MÓVEIS (Empilhar botões) --- */
  @media (max-width: 600px) {
    .button-group {
      flex-direction: column; /* Empilha verticalmente no celular */
      width: 80%;
      max-width: 300px;
    }
    .mc-button {
      font-size: 10px; /* Fonte ainda menor no celular */
      padding: 10px 15px;
    }
    .compass-gif {
      width: 40px;
      height: 40px;
    }
  }

  /* --- EFEITO DE EXPLOSÃO --- */
  .explosion-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 99;
  }

  .screen-flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes flashAnimation {
    0% { opacity: 0; }
    10% { opacity: 1; }
    100% { opacity: 0; }
  }

  .particle {
    position: fixed;
    width: 25px; 
    height: 25px;
    opacity: 0;
    pointer-events: none;
    box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
    border: 3px solid rgba(0,0,0,0.2);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes explodeBlockParticle {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(var(--scale)) rotate(var(--rotate));
    }
  }

  .particle-dirt { background-color: #8B4513; border-color: #3e1f08; }
  .particle-stone { background-color: #808080; border-color: #404040; }
  .particle-tnt { background-color: #B22222; border-color: #550000; box-shadow: 0 0 10px #B22222;}
  .particle-redstone { background-color: #FF0000; border-color: #800000; box-shadow: 0 0 8px #FF0000;}
  .particle-diamond { background-color: #32CD32; border-color: #006400; box-shadow: 0 0 15px #32CD32;}
  .particle-xp { background-color: #00FF00; border-radius: 50%; border: 3px solid #008000; box-shadow: 0 0 15px #00FF00;}

</style>
</head>
<body>

  <audio id="audio-creeper-hiss" src="creeper_hiss.mp3"></audio>
  <audio id="audio-tnt-explode" src="tnt_explode.mp3"></audio>
  <audio id="audio-loot-spawn" src="levelup_experience.mp3"></audio>

  <div class="screen-flash" id="flash"></div>
  <div class="explosion-container" id="explosion"></div>

  <div id="initial-screen">
    <img src="minecraft-logo.svg" alt="Minecraft Logo" class="minecraft-logo">
    
    <div id="creeper-container" onclick="creeperSurprise(this)">
      <img src="creeper.svg" alt="Creeper Face" class="creeper-svg">
      <p class="creeper-text">TOQUE NO CREEPER<br>PARA ENTRAR NO SERVIDOR</p>
    </div>
  </div>

  <div id="invite-container">
    <div class="floating">
      <img src="convite.jpeg" alt="Convite de Aniversário" class="invite-image">
    </div>
    
    <div class="button-group">
      <a href="https://wa.link/u9dj1i" class="mc-button rsvp-button" target="_blank">
        CONFIRME SUA PRESENÇA<br>NO NOSSO SERVIDOR
      </a>

      <a href="https://www.google.com/maps?q=-15.7212088,-48.1291647&z=17&hl=pt-BR" class="mc-button location-button" target="_blank">
        <img src="bussula.gif" alt="Bússola de Spawn" class="compass-gif">
        <div class="location-text">localização de Spawn<br>(casa da Vovó Conceicão)</div>
      </a>
    </div>
  </div>

  <script>
    function generateBlockParticles() {
      const blockTypes = ['dirt', 'stone', 'tnt', 'redstone', 'diamond', 'xp'];
      const numParticles = 40; 

      for (let i = 0; i < numParticles; i++) {
        const particle = document.createElement('div');
        const type = blockTypes[Math.floor(Math.random() * blockTypes.length)];
        particle.classList.add('particle', 'particle-' + type);

        const x = (Math.random() - 0.5) * 800; 
        const y = (Math.random() - 1) * 800;   
        const scale = 0.5 + Math.random() * 1.5; 
        const rotate = (Math.random() - 0.5) * 1440; 

        particle.style.setProperty('--x', `${x}px`);
        particle.style.setProperty('--y', `${y}px`);
        particle.style.setProperty('--scale', `${scale}`);
        particle.style.setProperty('--rotate', `${rotate}deg`);

        particle.style.animation = 'explodeBlockParticle 1s ease-out forwards';

        document.getElementById('explosion').appendChild(particle);

        setTimeout(() => {
          particle.remove();
        }, 1000);
      }
    }

    function triggerFlash() {
      const flash = document.getElementById('flash');
      flash.style.animation = 'flashAnimation 0.3s ease-out';
      setTimeout(() => {
        flash.style.animation = 'none';
      }, 300);
    }

    function creeperSurprise(creeperElement) {
      creeperElement.style.pointerEvents = 'none';

      const audioHiss = document.getElementById('audio-creeper-hiss');
      if (audioHiss) audioHiss.play().catch(e => console.log('Áudio de siss não carregou:', e));

      // Inicia animação de inflar
      creeperElement.style.animation = 'creeperInflate 1.5s ease-out forwards';

      setTimeout(() => {
        const audioExplode = document.getElementById('audio-tnt-explode');
        if (audioExplode) audioExplode.play().catch(e => console.log('Áudio de explosão não carregou:', e));

        triggerFlash();
        generateBlockParticles();

        // Esconde a tela inicial
        document.getElementById('initial-screen').style.display = 'none';

        setTimeout(() => {
          const audioLoot = document.getElementById('audio-loot-spawn');
          if (audioLoot) audioLoot.play().catch(e => console.log('Áudio de loot não carregou:', e));

          // Revela o convite com os novos botões
          const invite = document.getElementById('invite-container');
          invite.classList.add('show');
        }, 200); 
      }, 1500); 
    }
  </script>

</body>
</html>
